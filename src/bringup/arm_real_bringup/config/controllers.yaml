      goal_time: 0.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: false

waist_effort_controller:
  ros__parameters:
    joints:
      - waist_yaw_joint

# ─── LEFT LEG (6 joints) ───

left_leg_group_controller:
  ros__parameters:
    joints:
      - left_hip_pitch_joint
      - left_hip_roll_joint
      - left_hip_yaw_joint
      - left_knee_joint
      - left_ankle_pitch_joint
      - left_ankle_roll_joint
