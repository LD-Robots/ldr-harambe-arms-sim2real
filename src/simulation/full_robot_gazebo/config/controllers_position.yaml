# Position controller configuration for Harambe full humanoid robot
# 37 DOF: 1 waist + 6 left arm + 6 right arm + 6 left hand + 6 right hand + 6 left leg + 6 right leg
# All controllers use JointGroupPositionController (direct position commands for RL policy)

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_arm_controller:
      type: position_controllers/JointGroupPositionController

    right_arm_controller:
      type: position_controllers/JointGroupPositionController

    left_hand_controller:
      type: position_controllers/JointGroupPositionController

    right_hand_controller:
      type: position_controllers/JointGroupPositionController

    legs_controller:
      type: position_controllers/JointGroupPositionController

    whole_body_controller:
      type: position_controllers/JointGroupPositionController


left_arm_controller:
  ros__parameters:
    joints:
      - left_shoulder_pitch_joint_X6
      - left_shoulder_roll_joint_X6
      - left_shoulder_yaw_joint_X4
      - left_elbow_pitch_joint_X6
      - left_wrist_yaw_joint_X4
      - left_wrist_roll_joint_X4

right_arm_controller:
  ros__parameters:
    joints:
      - right_shoulder_pitch_joint_X6
      - right_shoulder_roll_joint_X6
      - right_shoulder_yaw_joint_X4
      - right_elbow_pitch_joint_X6
      - right_wrist_yaw_joint_X4
      - right_wrist_roll_joint_X4

left_hand_controller:
  ros__parameters:
    joints:
      - left_thumb_proximal_yaw_joint
      - left_thumb_proximal_pitch_joint
      - left_index_proximal_joint
      - left_middle_proximal_joint
      - left_ring_proximal_joint
      - left_pinky_proximal_joint

right_hand_controller:
  ros__parameters:
    joints:
      - right_thumb_proximal_yaw_joint
      - right_thumb_proximal_pitch_joint
      - right_index_proximal_joint
      - right_middle_proximal_joint
      - right_ring_proximal_joint
      - right_pinky_proximal_joint

legs_controller:
  ros__parameters:
    joints:
      - waist_yaw_joint_X8
      - left_hip_pitch_joint_X8
      - left_hip_roll_joint_X8
      - left_hip_yaw_joint_X8
      - left_knee_joint_X8
      - left_ankle_roll_joint_X4
      - left_ankle_pitch_joint_X4
      - right_hip_pitch_joint_X8
      - right_hip_roll_joint_X8
      - right_hip_yaw_joint_X8
      - right_knee_joint_X8
      - right_ankle_roll_joint_X4
      - right_ankle_pitch_joint_X4

whole_body_controller:
  ros__parameters:
    joints:
      # Left arm (0-5)
      - left_shoulder_pitch_joint_X6  # 0
      - left_shoulder_roll_joint_X6   # 1
      - left_shoulder_yaw_joint_X4    # 2
      - left_elbow_pitch_joint_X6     # 3
      - left_wrist_yaw_joint_X4       # 4
      - left_wrist_roll_joint_X4      # 5
      # Right arm (6-11)
      - right_shoulder_pitch_joint_X6 # 6
      - right_shoulder_roll_joint_X6  # 7
      - right_shoulder_yaw_joint_X4   # 8
      - right_elbow_pitch_joint_X6    # 9
      - right_wrist_yaw_joint_X4      # 10
      - right_wrist_roll_joint_X4     # 11
      # Waist (12)
      - waist_yaw_joint_X8            # 12
      # Left leg (13-18)
      - left_hip_pitch_joint_X8       # 13
      - left_hip_roll_joint_X8        # 14
      - left_hip_yaw_joint_X8         # 15
      - left_knee_joint_X8            # 16
      - left_ankle_pitch_joint_X4     # 17
      - left_ankle_roll_joint_X4      # 18
      # Right leg (19-24)
      - right_hip_pitch_joint_X8      # 19
      - right_hip_roll_joint_X8       # 20
      - right_hip_yaw_joint_X8        # 21
      - right_knee_joint_X8           # 22
      - right_ankle_pitch_joint_X4    # 23
      - right_ankle_roll_joint_X4     # 24
